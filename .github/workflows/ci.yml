name: SQA CI & CT Pipeline

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup PHP Environment
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: xdebug

    - name: Install PHP Dependencies
      run: composer install --prefer-dist --no-progress

    - name: Start PHP Server in Background
      run: |
        php -S localhost:8000 &
        sleep 5

    - name: Check Chrome and ChromeDriver
      run: |
        google-chrome --version
        chromedriver --version

    - name: Start ChromeDriver in Background
      run: |
        chromedriver --port=9515 &
        sleep 10

    - name: Verify ChromeDriver
      run: curl http://127.0.0.1:9515/status

    - name: Run All Automated Tests & Quality Metrics
      run: php vendor/bin/phpunit tests --coverage-text